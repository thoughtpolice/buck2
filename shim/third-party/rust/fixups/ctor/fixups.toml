# ctor >= 1.0.9 expands env!("CARGO_PKG_VERSION_{MAJOR,MINOR,PATCH}") in its
# target_vendor = "apple" code path, so the buckified build needs the cargo
# package env vars that a cargo build would provide.
cargo_env = true
