buildscript.run = false

# The crate's build.rs compiles the vendored mimalloc amalgamation
# (c_src/mimalloc/<version>/src/static.c). Without the "v2" feature the
# default is v3. Flags mirror build.rs for a release build:
# MI_DEBUG=0, MI_BUILD_RELEASE, NDEBUG, and initial-exec TLS on unix.

[['cfg(unix)'.cxx_library]]
name = "mimalloc-c-unix"
srcs = ["c_src/mimalloc/v3/src/static.c"]
headers = [
    "c_src/mimalloc/v3/include/**/*.h",
    "c_src/mimalloc/v3/src/**/*.c",
    "c_src/mimalloc/v3/src/**/*.h",
]
include_paths = ["c_src/mimalloc/v3/include", "c_src/mimalloc/v3/src"]
compiler_flags = [
    "-Wno-error",
    "-Wno-error=date-time",
    "-ftls-model=initial-exec",
    "-DMI_DEBUG=0",
    "-DMI_BUILD_RELEASE",
    "-DNDEBUG",
]
preferred_linkage = "static"

# On MSVC, build.rs compiles the amalgamation as C++17 for the C++
# atomics path; /TP forces cl to treat the .c source as C++.
[['cfg(all(target_os = "windows", target_env = "msvc"))'.cxx_library]]
name = "mimalloc-c-msvc"
srcs = ["c_src/mimalloc/v3/src/static.c"]
headers = [
    "c_src/mimalloc/v3/include/**/*.h",
    "c_src/mimalloc/v3/src/**/*.c",
    "c_src/mimalloc/v3/src/**/*.h",
]
include_paths = ["c_src/mimalloc/v3/include", "c_src/mimalloc/v3/src"]
compiler_flags = [
    "/TP",
    "/std:c++17",
    "/Zc:__cplusplus",
    "-DMI_DEBUG=0",
    "-DMI_BUILD_RELEASE",
    "-DNDEBUG",
]
preferred_linkage = "static"
